name: embedding_knowledge_agent
version: "1.0"
description: "知识库 embedding 词干提取（数据来自 state，不查业务表）"

nodes:
  # 调用这个流程的脚本需要满足before_embedding_func节点的数据输入要求，即下面的原始数据要能给它造出来，否则会造成流程运行数据缺失
  #             # 1. 读取 edges_var 中的数据
            # edges_var = state.get("edges_var", {})
            # scene_summary = edges_var.get("scene_summary", "")
            # optimization_question = edges_var.get("optimization_question", "")
            # input_tags = edges_var.get("input_tags", [])
            # response_tags = edges_var.get("response_tags", [])
            
            # # 2. 读取 prompt_vars 中的数据源信息
            # prompt_vars = state.get("prompt_vars", {})
            # source_id = prompt_vars.get("source_id")
            # source_table_name = prompt_vars.get("source_table_name")

  # 词干数据加工
  - name: format_data_node
    type: function
    config:
      function_key: "before_embedding_func"
      output:
        filed: embedding_str # 将结果保存到state的edges_var的哪个属性中

  # 词干数据embedding-agent,将input的值调用模型进行embedding，输出embedding_value
  - name: embedding_node
    type: em_agent
    config:
      model:
        provider: doubao-embedding
        name: doubao-embedding-vision-250615
      input:
        filed: embedding_str # 从state的edges_var的哪个属性中读取数据
      output:
        filed: embedding_value # 将结果保存到state的edges_var的哪个属性中

  # 词干数据入库
  - name: insert_data_to_vector_db_node
    type: function
    config:
      function_key: "insert_data_to_vector_db"
      input:
        filed: embedding_value  # 从state的edges_var的哪个属性中读取数据


edges:

  # 2. 词干数据加工
  - from: format_data_node
    to: embedding_node
    condition: always
  
  # 3. 词干数据embedding-agent
  - from: embedding_node
    to: insert_data_to_vector_db_node
    condition: always
  
  # 4. 词干数据入库完成后结束
  - from: insert_data_to_vector_db_node
    to: END
    condition: always

entry_node: format_data_node
