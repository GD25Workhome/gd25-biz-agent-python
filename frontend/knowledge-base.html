<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库查询</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: #304156;
            color: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }
        .sidebar-header {
            padding: 20px;
            background: #2b3a4a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f0f2f5;
        }
        .content-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .tag-array {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tag-array .el-tag {
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>知识库</h1>
            </div>
        </div>
        <div class="main-container">
            <div class="content-area">
                <knowledge-base-page></knowledge-base-page>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="js/knowledge-base.js"></script>
    <script>
        const { createApp } = Vue;
        const icons = ElementPlusIconsVue;
        const app = createApp({
            components: { KnowledgeBasePage }
        });
        app.use(ElementPlus);
        app.component('Search', icons.Search);
        app.component('Refresh', icons.Refresh);
        app.component('ArrowLeft', icons.ArrowLeft);
        app.component('ArrowRight', icons.ArrowRight);
        app.mount('#app');
    </script>
</body>
</html>
